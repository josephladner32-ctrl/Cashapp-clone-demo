<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash App Clone</title>
<style>
body { font-family: Arial, sans-serif; background: #f0f0f0; margin:0; padding:0; }
.container { max-width: 400px; margin: 50px auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
h2 { text-align:center; color: #2ecc71; }
input, button { width: 100%; padding: 10px; margin:5px 0; border-radius:5px; border:1px solid #ccc; }
button { background:#2ecc71; color:#fff; border:none; cursor:pointer; }
button:hover { background:#27ae60; }
#balance { font-size: 24px; text-align:center; margin:10px 0; }
#transactions { max-height:200px; overflow-y:auto; margin-top:10px; border-top:1px solid #ccc; padding-top:10px; }
.tx { padding:5px; border-bottom:1px solid #eee; }
</style>
</head>
<body>

<div class="container">
<h2>Cash App Clone</h2>

<div id="auth">
<input type="text" id="username" placeholder="Username">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">
<div id="balance">Balance: $0</div>
<input type="number" id="addAmount" placeholder="Amount to Add">
<button onclick="addFunds()">Add Funds</button>
<input type="email" id="sendEmail" placeholder="Send to Email">
<input type="number" id="sendAmount" placeholder="Amount to Send">
<button onclick="sendFunds()">Send Money</button>

<div id="transactions"></div>
<button onclick="logout()">Logout</button>
</div>

<script>
const API_URL = "http://localhost:3000"; // replace with your Railway backend URL later
let token = "";

async function register(){
  const username = document.getElementById('username').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const res = await fetch(API_URL+'/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})});
  const data = await res.json();
  alert(data.message);
}

async function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const res = await fetch(API_URL+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
  const data = await res.json();
  alert(data.message);
  if(data.success){ token = data.token; showDashboard(); fetchDashboard(); }
}

function showDashboard(){
  document.getElementById('auth').style.display='none';
  document.getElementById('dashboard').style.display='block';
}

function logout(){
  token = ""; document.getElementById('auth').style.display='block';
  document.getElementById('dashboard').style.display='none';
}

async function fetchDashboard(){
  const res = await fetch(API_URL+'/dashboard',{headers:{'Authorization':'Bearer '+token}});
  const data = await res.json();
  if(data.success){
    document.getElementById('balance').innerText = "Balance: $"+data.balance;
    const txDiv = document.getElementById('transactions'); txDiv.innerHTML="";
    data.transactions.reverse().forEach(t=>{
      const d = new Date(t.date);
      txDiv.innerHTML += `<div class="tx">${t.type.toUpperCase()}: $${t.amount} | ${t.from} → ${t.to} | ${d.toLocaleString()}</div>`;
    });
  }
}

async function addFunds(){
  const amount = parseFloat(document.getElementById('addAmount').value);
  const res = await fetch(API_URL+'/add',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({amount})});
  const data = await res.json();
  alert(data.message); fetchDashboard();
}

async function sendFunds(){
  const toEmail = document.getElementById('sendEmail').value;
  const amount = parseFloat(document.getElementById('sendAmount').value);
  const res = await fetch(API_URL+'/send',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({toEmail,amount})});
  const data = await res.json();
  alert(data.message); fetchDashboard();
}
</script>

</div>
</body>
</html>
